services:
  - type: web
    name: midigenerator-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX
        value: midigenerator-knowledge
      - key: UPLOADS_DIR
        value: ./uploads
      - key: OUTPUTS_DIR
        value: ./outputs
      - key: DB_PATH
        value: ./db/midigenerator.db
      - key: FRONTEND_URL
        sync: false